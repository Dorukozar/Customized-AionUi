# Diador — Nginx wildcard subdomain routing
# Install: ln -s /data/deploy/nginx/diador.conf /etc/nginx/sites-enabled/diador.conf

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Subdomain → loopback port routing (one line per client)
# Update this block when adding/removing clients, then: nginx -s reload
map $host $diador_port {
    hostnames;
    default             0;
    # client_name.diador.ai  port;
    # client1.diador.ai      25809;
    # client2.diador.ai      25810;
    # client3.diador.ai      25811;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name *.diador.ai diador.ai;
    return 301 https://$host$request_uri;
}

# HTTPS — wildcard subdomain server
server {
    listen 443 ssl;
    server_name *.diador.ai;

    # Wildcard TLS cert (Let's Encrypt DNS-01 via certbot-dns-route53)
    ssl_certificate     /etc/letsencrypt/live/diador.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diador.ai/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Return 444 (drop connection) for unknown subdomains
    if ($diador_port = 0) {
        return 444;
    }

    location / {
        proxy_pass http://127.0.0.1:$diador_port;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (MANDATORY — without this, sessions drop at 60s idle)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep WebSocket connections alive for 24h (resets on each message/ping)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Disable buffering — streaming AI responses must pass through immediately
        proxy_buffering off;
    }
}
